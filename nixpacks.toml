[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "postgresql"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

# migrate/seed は DATABASE_URL が注入される起動時に実行する
# (build フェーズでは DB に接続できない)
[start]
cmd = "php bin/migrate run && php bin/seed run && php -S 0.0.0.0:$PORT -t public/ router.php"
